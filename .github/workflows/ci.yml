name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  markdown-lint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DavidAnson/markdownlint-cli2-action@v19
        with:
          globs: |
            README.md
            CHANGELOG.md
            examples/*.md
            skill.md

  validate-examples:
    name: Validate Examples
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run example validation
        run: bash scripts/validate-examples.sh

  link-check:
    name: Link Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --exclude-path examples/demo.png
            --exclude 'mailto:*'
            --exclude 'agentskills.io'
            --exclude 'img.shields.io'
            --exclude 'zuva.ai'
            --no-progress
            README.md
          fail: true
